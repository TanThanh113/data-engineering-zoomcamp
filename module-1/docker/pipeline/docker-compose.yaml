services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "thanh123"
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: "ny_taxi"
    volumes:
      - "./ny_taxi_db_data:/var/lib/postgresql"
    ports:
      - "5433:5432"
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thanh123 -d ny_taxi"]
      interval: 5s    # Cứ 5 giây kiểm tra một lần
      timeout: 5s     # Quá 5 giây mà không phản hồi thì coi như lỗi
      retries: 5      # Thử lại tối đa 5 lần
      start_period: 10s

  ingest_data:
    build: .
    image: taxi_ingest:v001
    depends_on:
      pgdatabase:
        condition: service_healthy
    command: [
      "--pg-user=thanh123",
      "--pg-pass=1234",
      "--pg-host=pgdatabase",
      "--pg-port=5432",
      "--pg-db=ny_taxi",
      "--target-table=yellow_taxi_date_trip"
    ]
    